services:
  meshnode-mqtt:
    build: .
    container_name: meshnode-mqtt
    restart: unless-stopped
    environment:
      - BRIDGE_COMMUNITY_USER=${BRIDGE_COMMUNITY_USER}
      - BRIDGE_COMMUNITY_PASS=${BRIDGE_COMMUNITY_PASS}
      - BRIDGE_GLOBAL_USER=${BRIDGE_GLOBAL_USER}
      - BRIDGE_GLOBAL_PASS=${BRIDGE_GLOBAL_PASS}
      - BRIDGE_MESHNODEID_USER=${BRIDGE_MESHNODEID_USER}
      - BRIDGE_MESHNODEID_PASS=${BRIDGE_MESHNODEID_PASS}
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf.template:ro
      - ./mosquitto/passwd:/mosquitto/passwd:ro
      - ./mosquitto/acl:/mosquitto/acl:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  meshmap:
    build: ./meshmap
    container_name: meshmap
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - meshmap-data:/data
      - /etc/letsencrypt/live/kemplu.dari.asia/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/kemplu.dari.asia/privkey.pem:/certs/privkey.pem:ro
      - /etc/letsencrypt/archive/kemplu.dari.asia:/certs/archive:ro
    depends_on:
      - meshnode-mqtt

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  mosquitto-data:
  mosquitto-log:
  uptime-kuma-data:
  meshmap-data:
