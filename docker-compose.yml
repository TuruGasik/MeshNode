services:
  meshnode-mqtt:
    build: .
    container_name: meshnode-mqtt
    restart: unless-stopped
    environment:
      - BRIDGE_COMMUNITY_USER=${BRIDGE_COMMUNITY_USER}
      - BRIDGE_COMMUNITY_PASS=${BRIDGE_COMMUNITY_PASS}
      - BRIDGE_GLOBAL_USER=${BRIDGE_GLOBAL_USER}
      - BRIDGE_GLOBAL_PASS=${BRIDGE_GLOBAL_PASS}
      - BRIDGE_MESHNODEID_USER=${BRIDGE_MESHNODEID_USER}
      - BRIDGE_MESHNODEID_PASS=${BRIDGE_MESHNODEID_PASS}
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf.template:ro
      - ./mosquitto/passwd:/mosquitto/passwd:ro
      - ./mosquitto/acl:/mosquitto/acl:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 -u $${BRIDGE_COMMUNITY_USER} -P $${BRIDGE_COMMUNITY_PASS} 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  meshmap:
    build: ./meshmap
    container_name: meshmap
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - meshmap-data:/data
      - /etc/letsencrypt/live/${TLS_DOMAIN}/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/${TLS_DOMAIN}/privkey.pem:/certs/privkey.pem:ro
      - /etc/letsencrypt/archive/${TLS_DOMAIN}:/certs/archive:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost/nodes.json >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      meshnode-mqtt:
        condition: service_healthy

  mqtt-relay:
    build: ./mqtt-relay
    container_name: mqtt-relay
    restart: unless-stopped
    environment:
      - MQTT_HOST=meshnode-mqtt
      - MQTT_PORT=1883
      - MQTT_USERNAME=mqtt-relay
      - MQTT_PASSWORD=${RELAY_MQTT_PASSWORD}
      - SUBSCRIBE_TOPIC=msh/ID_923/#
      - SUBSCRIBE_BRIDGE_IN=msh/bridge_in/ID_923/#
      - BRIDGE_IN_PREFIX=msh/bridge_in/
      - RELAY_PREFIX=msh/relay/
      - SOURCE_PREFIX=msh/
      - DEDUP_TTL=600
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      meshnode-mqtt:
        condition: service_healthy

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  mosquitto-data:
  mosquitto-log:
  uptime-kuma-data:
  meshmap-data: