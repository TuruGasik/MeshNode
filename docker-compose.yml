services:
  meshnode-mqtt:
    build: .
    container_name: meshnode-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/passwd:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  meshmap:
    build: ./meshmap
    container_name: meshmap
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - MQTT_BROKER=tcp://meshnode-mqtt:1883
      - MQTT_USERNAME=meshmap
      - MQTT_PASSWORD=meshmap
    volumes:
      - meshmap-data:/data
    depends_on:
      - meshnode-mqtt

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  mosquitto-data:
  mosquitto-log:
  uptime-kuma-data:
  meshmap-data:
