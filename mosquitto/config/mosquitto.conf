# =============================================================
# MeshNode Indonesia - Mosquitto MQTT Broker Configuration
# =============================================================
# Runs a local Mosquitto broker and bridges to:
#   1. Community server: mqtt.s-project.web.id (idmeshnode)
#   2. Global Meshtastic: mqtt.meshtastic.org (meshdev)
# =============================================================

# -------------------------------------------------------
# General / Listener settings
# -------------------------------------------------------
listener 1883
# Allow anonymous access so Meshtastic nodes can connect without credentials.
# If you want to restrict access, set allow_anonymous to false and configure
# a password file with mosquitto_passwd.
allow_anonymous false
password_file /mosquitto/passwd
acl_file /mosquitto/acl

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# -------------------------------------------------------
# Bridge to Indonesian Community MQTT Server
# (mqtt.s-project.web.id)
# BIDIRECTIONAL — Local acts as hub/relay
# try_private true prevents ping-pong on this connection
# -------------------------------------------------------
connection bridge-community-id
address mqtt.s-project.web.id:1883
remote_username ${BRIDGE_COMMUNITY_USER}
remote_password ${BRIDGE_COMMUNITY_PASS}
cleansession true
start_type automatic
keepalive_interval 30
restart_timeout 5 30
bridge_attempt_unsubscribe false
try_private true
notifications false

# Bidirectional: Local ↔ Community (QoS 0)
topic msh/ID_923/# both 0

# -------------------------------------------------------
# Bridge to Global Meshtastic MQTT Server
# (mqtt.meshtastic.org)
# Receive only - collect global meshmap data
# -------------------------------------------------------
connection bridge-meshtastic-global
address mqtt.meshtastic.org:1883
remote_username ${BRIDGE_GLOBAL_USER}
remote_password ${BRIDGE_GLOBAL_PASS}
cleansession true
start_type automatic
keepalive_interval 30
restart_timeout 5 30
bridge_attempt_unsubscribe false
try_private false
notifications false
topic msh/ID_923/# in 0

# -------------------------------------------------------
# Bridge to MeshNodeID MQTT Server
# (103.141.75.100)
# BIDIRECTIONAL — Local acts as hub/relay
# try_private true prevents ping-pong on this connection
# -------------------------------------------------------
connection bridge-meshnodeid
address 103.141.75.100:1883
remote_username ${BRIDGE_MESHNODEID_USER}
remote_password ${BRIDGE_MESHNODEID_PASS}
cleansession true
start_type automatic
keepalive_interval 30
restart_timeout 5 30
bridge_attempt_unsubscribe false
try_private true
notifications false

# Bidirectional: Local ↔ MeshNodeID (QoS 0)
topic msh/ID_923/# both 0

# -------------------------------------------------------
# TLS / SSL Settings (MQTTS on 8883)
# -------------------------------------------------------
listener 8883
allow_anonymous false
password_file /mosquitto/passwd
acl_file /mosquitto/acl

certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem
tls_version tlsv1.2
