# =============================================================
# MeshNode Indonesia - Mosquitto MQTT Broker Configuration
# =============================================================
# Runs a local Mosquitto broker and bridges to:
#   1. Community server: mqtt.meshnode.id (idmeshnode)
#   2. Global Meshtastic: mqtt.meshtastic.org (meshdev)
#   3. Padang: 103.141.75.100
#
# Anti-loop strategy:
#   - Local clients publish/subscribe on standard topic: msh/ID/#
#   - Inbound  : bridges receive into  msh/bridge_in/ID/#
#   - Outbound : bridges send from     msh/relay/ID/#
#   - Relay-dedup service:
#     msh/bridge_in/ID/# → msh/ID/# (unique inbound)
#     msh/ID/# → msh/relay/ID/# (local client outbound)
#   - Self-echo (relay publishes to msh/ID/# then receives it)
#     is handled by SHA-256 dedup — hash is already cached.
#   - Cross-direction echo (local msg returns via bridge) is also
#     handled by dedup — same canonical hash for both directions.
# =============================================================

# -------------------------------------------------------
# General / Listener settings
# -------------------------------------------------------
listener 1883
allow_anonymous false
password_file /mosquitto/passwd
acl_file /mosquitto/acl

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# -------------------------------------------------------
# Bridge to Indonesian MeshNode MQTT Server
# (mqtt.meshnode.id)
# -------------------------------------------------------
connection bridge-meshnode
address mqtt.meshnode.id:1883
remote_username ${BRIDGE_COMMUNITY_USER}
remote_password ${BRIDGE_COMMUNITY_PASS}
cleansession true
start_type automatic
keepalive_interval 30
restart_timeout 5 30
bridge_attempt_unsubscribe false
try_private false
notifications false

# Inbound: remote msh/ID/... → local msh/bridge_in/ID/...
topic # in 0 msh/bridge_in/ID/ msh/ID/

# Outbound: local msh/relay/ID/... → remote msh/ID/...
topic # out 0 msh/relay/ID/ msh/ID/

# -------------------------------------------------------
# Bridge to Global Meshtastic MQTT Server
# (mqtt.meshtastic.org)
# -------------------------------------------------------
connection bridge-meshtastic
address mqtt.meshtastic.org:1883
remote_username ${BRIDGE_GLOBAL_USER}
remote_password ${BRIDGE_GLOBAL_PASS}
cleansession true
start_type automatic
keepalive_interval 30
restart_timeout 5 30
bridge_attempt_unsubscribe false
try_private false
notifications false

# Inbound: remote msh/ID/... → local msh/bridge_in/ID/...
topic # in 0 msh/bridge_in/ID/ msh/ID/

# Outbound: local msh/relay/ID/... → remote msh/ID/...
topic # out 0 msh/relay/ID/ msh/ID/

# -------------------------------------------------------
# Bridge to Padang MQTT Server
# (103.141.75.100)
