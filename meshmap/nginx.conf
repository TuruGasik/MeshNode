# Rate limit zone for /v0 management endpoint
limit_req_zone $binary_remote_addr zone=mgmt:10m rate=5r/s;

# Reduce server fingerprinting
server_tokens off;

# Proper Connection header handling for WebSocket and non-WebSocket requests
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Default server - reject unknown domains
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_reject_handshake on;

    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name map.dari.asia map.meshnode.id;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name map.dari.asia map.meshnode.id;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico {
        alias /usr/share/nginx/html/img/favicon.ico;
    }

    # nodes.json is written by meshobserv into /data and updated every minute
    location = /nodes.json {
        alias /data/nodes.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API proxy to meshobserv HTTP server
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name kemplu.dari.asia;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kemplu.dari.asia;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://meshnode-mqtt:18083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# llm.dari.asia - Management Center web panel
server {
    listen 80;
    listen [::]:80;
    server_name llm.dari.asia;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name llm.dari.asia;

    ssl_certificate     /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HSTS - force HTTPS for 1 year + includeSubDomains + preload eligible
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Prevent browsers from MIME-sniffing responses away from declared type
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    # Prevent Flash/Acrobat from sending cross-domain requests
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Allow dashboard model discovery only
    # Expose GET/OPTIONS /v1/models, block every other /v1 path
    location = /v1/models {
        limit_req zone=mgmt burst=30 nodelay;

        # Allow dashboard to read models list from JS
        add_header Access-Control-Allow-Origin "https://llm.dari.asia" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Max-Age 3600 always;

        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Only allow model discovery methods
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass http://172.18.0.1:8317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block all other /v1 endpoints on dashboard domain
    location = /v1 {
        return 403;
    }

    location ^~ /v1/ {
        return 403;
    }

    # CLI Proxy API - management endpoint (used by dashboard)
    location /v0 {
        limit_req zone=mgmt burst=20 nodelay;

        proxy_pass http://172.18.0.1:8317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Management Center web panel
    location / {
        proxy_pass http://172.18.0.1:8318;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CSP - single-file SPA with inlined assets
        # - script-src 'unsafe-inline': required by vite-plugin-singlefile (all JS inlined)
        # - style-src 'unsafe-inline': required by CSS modules & dynamic styles
        # - img-src data: blob:: inline logo + chart exports
        # - connect-src 'self' https: wss: API + WebSocket connections
        # - font-src 'self': bundled fonts if any
        # - frame-ancestors 'none': prevent clickjacking via iframe
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https: wss: ws:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}